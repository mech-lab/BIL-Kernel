{% extends "base.html" %}

{% block extrahead %}
  <!-- Additional favicon formats -->
  <link rel="icon" href="{{ base_url }}/assets/favicon.ico" sizes="any">
  <link rel="icon" href="{{ base_url }}/assets/favicon.svg" type="image/svg+xml">
{% endblock %}

{% block header %}
  <header class="md-header" data-md-component="header">
    <nav class="md-header__inner md-grid">
      <!-- Logo -->
      <a href="https://axiommath.ai/" class="md-header__button md-logo">
        <img src="{{ base_url }}/assets/logo.svg" alt="Axiom">
      </a>

      <!-- Spacer -->
      <div style="flex-grow:1;"></div>

      <!-- Nav links -->
      <nav class="md-header__nav">
        <a href="/" class="md-header__link">AXLE</a>
        <a href="https://github.com/AxiomMath/axiom-lean-engine" target="_blank" rel="noopener" class="md-header__link">GitHub</a>
        <a href="/v1/docs/" class="md-header__link">Docs</a>
        <a href="/app/console" class="md-header__link">Console</a>
      </nav>

      <!-- Search -->
      <label class="md-header__button md-icon" for="__search">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.52 6.52 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5"/>
        </svg>
      </label>

      {% include "partials/search.html" %}
    </nav>
  </header>
{% endblock %}
